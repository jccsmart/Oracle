<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCCsmart | Secure Payment</title>
    <style>
        :root {
            --primary-color: #5c46e5;
            --bg-color: #ffffff;
            --text-main: #222;
            --text-secondary: #666;
            --input-border: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header */
        header {
            width: 100%;
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            box-sizing: border-box;
        }
        .logo { display: flex; align-items: center; font-size: 22px; font-weight: bold; }
        .logo span { background: #5cb85c; color: white; padding: 2px 8px; border-radius: 4px; margin-right: 5px; }
        .logo-text { color: #777; font-weight: 400; }

        .container {
            max-width: 400px;
            width: 90%;
            margin-top: 50px;
            text-align: center;
        }

        /* View Management */
        .view { display: none; }
        .view.active { display: block; }

        /* Step 1: Invoice */
        .amount-card {
            background: #f8f7ff;
            border: 1px solid #e0daff;
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
        }
        .amount { font-size: 48px; font-weight: 800; color: var(--primary-color); }
        .label { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; }

        /* Step 2: Card Form */
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500; color: #444; }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--primary-color); }
        .row { display: flex; gap: 15px; }

        /* Button */
        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(92, 70, 229, 0.2);
            margin-top: 20px;
        }
        .btn:hover { background: #4a38c2; }

        .secure-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            opacity: 0.5;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>JCC</span><div class="logo-text">smart</div></div>
    </header>

    <div class="container">
        
        <!-- PAGE 1: Invoice Details -->
        <div id="view-invoice" class="view active">
            <div style="font-size: 60px;">⚡</div>
            <h2>Electricity Bill</h2>
            <p style="color: #888;">Account Number: 4400 1289 90</p>
            
            <div class="amount-card">
                <div class="label">Balance Due</div>
                <div class="amount">178.90€</div>
            </div>

            <button class="btn" onclick="showView('view-card')">Pay Now</button>
        </div>

        <!-- PAGE 2: Card Payment -->
        <div id="view-card" class="view">
            <h2 style="margin-bottom: 30px;">Card Details</h2>
            
            <div class="form-group">
                <label>Cardholder Name</label>
                <input type="text" placeholder="JOHN DOE" id="name">
            </div>

            <div class="form-group">
                <label>Card Number</label>
                <input type="text" placeholder="0000 0000 0000 0000" id="cardnum">
            </div>

            <div class="row">
                <div class="form-group" style="flex: 2;">
                    <label>Expiry Date</label>
                    <input type="text" placeholder="MM / YY" id="expiry">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>CVC</label>
                    <input type="password" placeholder="123" id="cvc">
                </div>
            </div>

            <button class="btn" onclick="processPayment()">Complete Payment</button>
            <p style="font-size: 13px; color: #999; margin-top: 15px; cursor: pointer;" onclick="showView('view-invoice')">← Go back</p>
        </div>

        <div class="secure-info">
            <span>🔒 SSL Encrypted</span>
            <span>💳 PCI Compliant</span>
        </div>
    </div>

    <script>
        // Функция переключения страниц
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            window.scrollTo(0,0);
        }

        // Простая заглушка для кнопки "Оплатить"
        function processPayment() {
            const name = document.getElementById('name').value;
            if(!name) {
                alert('Please fill in the card details');
                return;
            }
            alert('Processing your payment of 178.90€...');
        }
    </script>

</body>
</html>
